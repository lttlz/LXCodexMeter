name: Reconstruct demo video

on:
  push:
    branches:
      - review/add-demo-video
    paths:
      - .video-upload/READY

permissions:
  contents: write

jobs:
  reconstruct:
    runs-on: ubuntu-latest
    steps:
      - name: Check out review branch
        uses: actions/checkout@v4
        with:
          ref: review/add-demo-video

      - name: Reconstruct and verify video
        shell: bash
        run: |
          set -euo pipefail

          # Deleting READY in the generated commit triggers this workflow once more.
          # Exit cleanly on that follow-up run.
          if [[ ! -f .video-upload/READY ]]; then
            echo "No upload marker found; nothing to do."
            exit 0
          fi

          mkdir -p docs/media
          cat .video-upload/part-* | base64 --decode > docs/media/lx-codex-meter-demo-v0.6.15.mp4
          echo "b69c7f5bed6076f8ad70da89f4180531abc9a7a5aaaef48b31f695495fc14130  docs/media/lx-codex-meter-demo-v0.6.15.mp4" | sha256sum --check -

          rm -rf .video-upload

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: add demo video"
          git push origin HEAD:review/add-demo-video
